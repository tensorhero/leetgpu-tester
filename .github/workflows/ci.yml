name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build tester
        run: go build -v .

      - name: Run unit tests
        run: go test -v ./...

      - name: Verify binary
        run: ./leetgpu-tester --help

  regression-test:
    needs: unit-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: ghcr.io/bootcraft-cn/leetgpu-tester:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Checkout solution (numba branch)
        uses: actions/checkout@v4
        with:
          repository: bootcraft-cn/leetgpu-solution
          token: ${{ secrets.SOLUTION_REPO_PAT }}
          ref: numba
          path: solution-numba

      - name: Run regression tests
        run: |
          STAGES=(
            # Phase 1: Thread & Memory Model
            map zip guard map-2d broadcast blocks blocks-2d
            # Phase 2: Shared Memory
            shared-memory pooling dot-product conv1d prefix-sum axis-sum matmul
            # Phase 3: ML Kernels
            relu-kernel softmax-kernel layernorm-kernel cross-entropy-kernel
            attention-kernel transpose
          )
          LANGUAGES=(numba)

          FAILED=()
          TOTAL=0
          for lang in "${LANGUAGES[@]}"; do
            for stage in "${STAGES[@]}"; do
              TOTAL=$((TOTAL + 1))
              echo "Testing ${stage} (${lang})..."
              if docker run --rm --user $(id -u):$(id -g) -v "$(pwd)/solution-${lang}:/workspace" ghcr.io/bootcraft-cn/leetgpu-tester:test \
                -s "$stage" -d /workspace; then
                echo "✓ ${stage} (${lang}) passed"
              else
                echo "✗ ${stage} (${lang}) failed"
                FAILED+=("${stage}:${lang}")
              fi
            done
          done

          if [ ${#FAILED[@]} -gt 0 ]; then
            echo ""
            echo "Failed: ${FAILED[*]}"
            exit 1
          fi

          echo ""
          echo "All ${TOTAL} tests passed!"
